name: Compile Mobile App APK
on: [push]
jobs:
  engine_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # 1. Erases pre-existing cache and installs raw native file environments
      - run: flutter create . --overwrite --org com.natore.mojarmess
      
      # 2. Injects system lines forcing compliance with modern Android 13/14/15 standards
      - name: Inject Target SDK Upgrades
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
          
      - run: flutter pub get
      - run: flutter build apk --split-per-abi
      
      - name: Export APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-app
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
